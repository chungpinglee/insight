<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="ie=edge" />
<title>訪談摘要心智圖 - 互動修正版</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: "Microsoft JhengHei", ui-sans-serif, system-ui, sans-serif;
    background-color: #f8fafc;
  }
  #mindmap {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  /* 控制面板樣式：移至左下角並改為緊湊垂直排列 */
  .control-panel {
    position: fixed;
    bottom: 20px; /* 置於下層 */
    left: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(255, 255, 255, 0.85);
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .control-panel h3 {
    font-size: 11px;
    margin-bottom: 4px;
    color: #64748b;
    text-align: center;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .button-group {
    display: flex;
    flex-direction: column; /* 上下排列 */
    gap: 4px;
  }
  button {
    cursor: pointer;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.2s ease;
    color: #475569;
    outline: none;
    white-space: nowrap;
  }
  button:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
    color: #0f172a;
  }
  button.active {
    background: #2563eb;
    color: #ffffff;
    border-color: #2563eb;
  }

  /* 深色模式適應 */
  @media (prefers-color-scheme: dark) {
    body { background-color: #0f172a; }
    .markmap-dark { background: #0f172a; color: #f8fafc; }
    .control-panel {
      background: rgba(30, 41, 59, 0.8);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .control-panel h3 { color: #94a3b8; }
    button {
      background: #1e293b;
      border-color: #334155;
      color: #94a3b8;
    }
    button:hover { background: #334155; color: #f1f5f9; }
    button.active { background: #3b82f6; color: white; border-color: #3b82f6; }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/style.css">
</head>
<body>

<div class="control-panel">
  <h3>層級檢視</h3>
  <div class="button-group">
    <button onclick="setExpandLevel(1)" id="btn-1" class="active">L1 摘要</button>
    <button onclick="setExpandLevel(2)" id="btn-2">L2 分類</button>
    <button onclick="setExpandLevel(3)" id="btn-3">L3 細節</button>
    <button onclick="setExpandLevel(99)" id="btn-all">全部展開</button>
  </div>
</div>

<svg id="mindmap"></svg>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script>

<script>
  // 資料結構：標題分為兩段，保留所有超連結
  const rawData = {"content":"托尼·羅賓斯<br/>人生動力與 AI 時代生存指南","children":[{"content":"<strong>核心起點：人生的三個決定</strong>","children":[{"content":"你把注意力放在哪裡？","children":[],"payload":{"tag":"li","lines":"3,4"}},{"content":"這件事對你意味著什麼？","children":[],"payload":{"tag":"li","lines":"4,5"}},{"content":"你打算怎麼做？","children":[],"payload":{"tag":"li","lines":"5,6"}},{"content":"<em>底層邏輯</em>：你看見什麼，你就活在什麼裡，你決定做什麼。","children":[],"payload":{"tag":"li","lines":"6,7"}},{"content":"<a href=\"1.核心起點與助人初衷.html\">舉例</a>","children":[],"payload":{"tag":"li","lines":"7,8"}}],"payload":{"tag":"li","lines":"2,8"}},{"content":"<strong>底層驅動力：人類的六項核心需求</strong>","children":[{"content":"人格需求（建立自我與生存驅動）","children":[{"content":"確定性 (Certainty)","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"不確定性 / 多樣性 (Uncertainty / Variety)：追求刺激與變化","children":[],"payload":{"tag":"li","lines":"11,12"}},{"content":"重要性 (Significance)：渴望被看見與重視。社交媒體使其變得極度廉價，並常與「愛」的追求產生衝突。","children":[],"payload":{"tag":"li","lines":"12,13"}},{"content":"愛與連結 (Love & Connection)","children":[],"payload":{"tag":"li","lines":"13,14"}}],"payload":{"tag":"li","lines":"9,14"}},{"content":"精神需求（唯二沒有負面效應的需求）","children":[{"content":"成長 (Growth)","children":[],"payload":{"tag":"li","lines":"15,16"}},{"content":"貢獻 (Contribution)","children":[],"payload":{"tag":"li","lines":"16,17"}},{"content":"<em>底層邏輯</em>：找到一件比自己更重要的事並為之貢獻，能消除持續向內關注帶來的脆弱與內耗，為人生帶來隨時隨地存在的意義與動力。","children":[],"payload":{"tag":"li","lines":"17,18"}}],"payload":{"tag":"li","lines":"14,18"}}],"payload":{"tag":"li","lines":"8,18"}},{"content":"<strong>應對 AI 時代策略：從「管理者」躍升為「創造者」</strong>","children":[{"content":"拒絕被取代的關鍵能力：模式識別的三個層次","children":[{"content":"第一層：模式識別 (Pattern Recognition) —— 看見事物背後的規律與循環，從而消除未知的恐懼，不被混亂壓垮。","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"第二層：模式運用 (Pattern Utilization) —— 拆解頂尖高手的成功邏輯，並內化應用到自己的領域。","children":[],"payload":{"tag":"li","lines":"21,22"}},{"content":"第三層：模式創造 (Pattern Creation) —— 吸收足夠多後創造出世界未曾見過的東西，產生 AI 難以替代的極高價值。","children":[],"payload":{"tag":"li","lines":"22,23"}}],"payload":{"tag":"li","lines":"19,23"}},{"content":"具體實踐","children":[{"content":"每天抽出 15 分鐘進行主動的「微學習」，取代被動滑手機。","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"切勿將個人身份與隨時可能消失的職業（如工程師、司機）過度綁定。","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<a href=\"2.AI時代的危機與歷史視角.html\">舉例</a>","children":[],"payload":{"tag":"li","lines":"26,27"}}],"payload":{"tag":"li","lines":"23,26"}}],"payload":{"tag":"li","lines":"18,27"}},{"content":"<strong>看見規律的應用：人生的四季</strong>","children":[{"content":"春天（0-21歲）：生長與吸收，順境多來自季節的饋贈。","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"夏天（22-42歲）：信念屢被挑戰，是多數人生命中最艱難的階段，必須堅持住並持續成長。","children":[],"payload":{"tag":"li","lines":"29,30"}},{"content":"秋天（43-63歲）：模式看得更清晰、更具戰略性，能輕鬆收穫前兩季播種的成果。","children":[],"payload":{"tag":"li","lines":"30,31"}},{"content":"冬天（64歲以上）：知道自己是誰，不再需要向人證明，滿懷回饋的動力。","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"<a href=\"3.應對變革的能力：模式識別與創造.html\">舉例1</a>，<a href=\"4.驅動力與人際關係.html\">舉例2</a>","children":[],"payload":{"tag":"li","lines":"32,33"}}],"payload":{"tag":"li","lines":"27,33"}},{"content":"<strong>建立財富：投資大師的四個關鍵思維</strong>","children":[{"content":"1.不賠錢優先：避免虧損50%需要獲利100%才能回本的非對稱數學陷阱。","children":[],"payload":{"tag":"li","lines":"34,35"}},{"content":"2.非對稱風險回報：尋找輸了只賠一點、贏了能賺五倍（5比1法則）的機會，擁有極高容錯率。","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"3.資產真正分散：在危機時將資金配置於「彼此完全不相關」的公開與私募資產上。","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"4.成為所有者：打破消費者思維，在購買好產品的同時，思考如何擁有這家公司。","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<a href=\"5.商業與投資思維.html\">舉例</a>","children":[],"payload":{"tag":"li","lines":"38,39"}}],"payload":{"tag":"li","lines":"33,39"}},{"content":"<strong>終極使命：遺產與影響力</strong>","children":[{"content":"第一層影響力：改變某個人此刻的狀態。","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"第二層影響力：不在場時，依然能改變別人的價值觀與看問題的方式。","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"第三層影響力：利用科技（如運用 AI 建立50種語言的干預治療平台），在全球範圍內幫助那些未曾謀面的人。","children":[],"payload":{"tag":"li","lines":"42,43"}}],"payload":{"tag":"li","lines":"39,43"}}],"payload":{"tag":"h1","lines":"0,1"}};

  let mm;
  const { Markmap, loadCSS, loadJS } = window.markmap;

  // 強制遞迴控制節點狀態
  function applyLevel(node, targetLevel, currentLevel = 0) {
    if (!node.children || node.children.length === 0) return;
    
    if (currentLevel >= targetLevel) {
      node.payload = { ...node.payload, fold: 1 }; // 折疊
    } else {
      node.payload = { ...node.payload, fold: 0 }; // 展開
    }

    node.children.forEach(child => applyLevel(child, targetLevel, currentLevel + 1));
  }

  function initMindmap() {
    const options = {
      duration: 600,
      paddingX: 16,
      autoFit: true,
    };
    
    const initialData = JSON.parse(JSON.stringify(rawData));
    applyLevel(initialData, 1);
    
    mm = Markmap.create("#mindmap", options, initialData);

    // 延遲添加工具欄（置於右下角）
    setTimeout(() => {
      const { Toolbar } = window.markmap;
      const toolbar = new Toolbar();
      toolbar.attach(mm);
      const toolbarEl = toolbar.render();
      toolbarEl.setAttribute("style", "position:absolute;bottom:20px;right:20px");
      document.body.append(toolbarEl);
      mm.fit();
    }, 200);

    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      document.documentElement.classList.add("markmap-dark");
    }
  }

  function setExpandLevel(level) {
    document.querySelectorAll('.button-group button').forEach(btn => btn.classList.remove('active'));
    if(level === 1) document.getElementById('btn-1').classList.add('active');
    else if(level === 2) document.getElementById('btn-2').classList.add('active');
    else if(level === 3) document.getElementById('btn-3').classList.add('active');
    else document.getElementById('btn-all').classList.add('active');

    const newData = JSON.parse(JSON.stringify(rawData));
    applyLevel(newData, level);
    mm.setData(newData);
    
    setTimeout(() => {
      mm.fit();
    }, 100);
  }

  window.addEventListener('resize', () => {
    if (mm) mm.fit();
  });

  window.onload = initMindmap;
</script>
</body>
</html>
